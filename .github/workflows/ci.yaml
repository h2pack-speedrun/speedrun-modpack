name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - name: Install Lua validation runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit
          sudo luarocks --lua-version=5.2 install luacheck

      - name: Validate platform dependency versions
        run: python3 ModpackTools/validate_platform_versions.py

      - name: Run shell tests
        run: ModpackTools/run ModpackTools/test_all.py
