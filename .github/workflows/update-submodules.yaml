name: Update submodule pointers

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN || github.token }}

      - name: Update all submodules to latest
        run: git submodule update --remote

      - name: Check for submodule pointer changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All submodule pointers are up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check pull request automation token
        if: steps.changes.outputs.changed == 'true'
        env:
          SUBMODULE_UPDATE_TOKEN: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
        run: |
          if [ -z "$SUBMODULE_UPDATE_TOKEN" ]; then
            echo "::error title=Missing SUBMODULE_UPDATE_TOKEN::Set a repository or organization secret named SUBMODULE_UPDATE_TOKEN using a fine-grained PAT or GitHub App token with Contents: read/write and Pull requests: read/write permissions."
            exit 1
          fi

      - name: Validate platform dependency versions
        if: steps.changes.outputs.changed == 'true'
        run: python3 Setup/validate_platform_versions.py

      - name: Install Lua validation runtime
        if: steps.changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit
          sudo luarocks --lua-version=5.2 install luacheck

      - name: Run ModpackLib tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: adamant-ModpackLib
        run: lua5.2 tests/all.lua

      - name: Run ModpackFramework tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: adamant-ModpackFramework
        run: lua5.2 tests/all.lua

      - name: Validate coordinator sources
        if: steps.changes.outputs.changed == 'true'
        run: |
          (
            cd adamant-Speedrun_Core
            luacheck src/
            find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p
          )

      - name: Validate module sources
        if: steps.changes.outputs.changed == 'true'
        run: |
          for repo in Submodules/adamant-*; do
            if [ ! -d "$repo/src" ]; then
              continue
            fi

            echo "=== Validating $repo ==="
            (
              cd "$repo"
              luacheck src/
              find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p

              if [ -f tests/all.lua ]; then
                echo "--- Running tests for $repo ---"
                lua5.2 tests/all.lua
              fi
            )
          done

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
        run: |
          BRANCH="automation/update-submodules"
          TITLE="Update submodule pointers"
          BODY="Automated submodule pointer update. Pack-wide Lua validation passed before this PR was opened."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH" || true
          EXPECTED_REMOTE_SHA=$(git rev-parse --verify "refs/remotes/origin/$BRANCH" 2>/dev/null || true)

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "update submodule pointers"
          if [ -n "$EXPECTED_REMOTE_SHA" ]; then
            git push --force-with-lease="refs/heads/$BRANCH:$EXPECTED_REMOTE_SHA" origin "$BRANCH"
          else
            git push origin "$BRANCH"
          fi

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$BODY"
          else
            if ! gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"; then
              echo "::error title=Pull request creation failed::SUBMODULE_UPDATE_TOKEN must be a fine-grained PAT or GitHub App token with Contents: read/write and Pull requests: read/write access to this repository."
              exit 1
            fi
          fi
