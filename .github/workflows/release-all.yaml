name: Release All
run-name: ${{ format('{0} {1}', inputs.is-dry-run && 'Dry-run' || 'Release', inputs.tag) }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / Version number (e.g. 1.0.1)"
        required: true
      is-dry-run:
        description: "Dry-run (trigger dry-runs on all repos, no publish)"
        type: boolean
      modules:
        description: "Comma-separated repo names to release (blank = all)"
        required: false

jobs:
  release:
    name: Trigger releases
    runs-on: ubuntu-latest
    steps:
      - name: Check input tag format
        env:
          TAG: ${{ inputs.tag }}
          FILTER: ${{ inputs.modules }}
        run: |
          if ! echo "$TAG" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error title=Invalid package version number::Version numbers must follow the Major.Minor.Patch format (e.g. 1.45.320)."
            exit 1
          fi

          PATCH_VERSION=$(echo "$TAG" | cut -d. -f3)

          if [ -z "$FILTER" ]; then
            if [ "$PATCH_VERSION" != "0" ]; then
              echo "::error title=Invalid Mass Release Version::Mass releases (all modules) must end in .0 (e.g., 1.2.0) to reserve patch numbers for hotfixes."
              exit 1
            fi
          else
            if [ "$PATCH_VERSION" == "0" ]; then
              echo "::error title=Invalid Hotfix Version::Targeted hotfixes must use a patch version greater than .0 (e.g., 1.2.1)."
              exit 1
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}

      - name: Install Lua validation runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit
          sudo luarocks --lua-version=5.2 install luacheck

      - name: Run ModpackLib tests
        working-directory: adamant-ModpackLib
        run: lua5.2 tests/all.lua

      - name: Run ModpackFramework tests
        working-directory: adamant-ModpackFramework
        run: lua5.2 tests/all.lua

      - name: Validate coordinator sources
        run: |
          (
            cd adamant-Speedrun_Core
            luacheck src/
            find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p
          )

      - name: Validate module sources
        run: |
          for repo in Submodules/adamant-*; do
            if [ ! -d "$repo/src" ]; then
              continue
            fi

            echo "=== Validating $repo ==="
            (
              cd "$repo"
              luacheck src/
              find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p

              if [ -f tests/all.lua ]; then
                echo "--- Running tests for $repo ---"
                lua5.2 tests/all.lua
              fi
            )
          done

      - name: Trigger release workflows
        env:
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.is-dry-run }}
          FILTER: ${{ inputs.modules }}
        run: |
          ORG="h2pack-speedrun"

          REGISTRY_MODULES=$(gh api repos/$ORG/speedrun-modpack/contents/Submodules \
            --jq '.[].name' | grep '^adamant-')

          mapfile -t ALL_REPOS <<< "$(printf 'adamant-Speedrun_Core\n%s' "$REGISTRY_MODULES")"

          if [ -n "$FILTER" ]; then
            IFS=',' read -ra REPOS <<< "$FILTER"
            for i in "${!REPOS[@]}"; do
              REPOS[$i]=$(echo "${REPOS[$i]}" | xargs)
              if [ "${REPOS[$i]}" = "ModpackSpeedrunCore" ] || [ "${REPOS[$i]}" = "adamant-Speedrun_Core" ]; then
                REPOS[$i]="adamant-Speedrun_Core"
              elif [[ "${REPOS[$i]}" != adamant-* ]]; then
                REPOS[$i]="adamant-${REPOS[$i]}"
              fi
            done
          else
            REPOS=("${ALL_REPOS[@]}")
          fi

          SUCCEEDED=0
          DISPATCH_FAILED=0
          RELEASE_FAILED=0
          RUN_REPOS=()
          RUN_IDS=()

          for REPO in "${REPOS[@]}"; do
            echo "--- Triggering: $ORG/$REPO ---"
            DISPATCHED_AFTER=$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%SZ)

            if gh workflow run release.yaml \
              --repo "$ORG/$REPO" \
              --field "tag=$TAG" \
              --field "is-dry-run=$DRY_RUN"; then
              RUN_ID=""
              for attempt in {1..30}; do
                RUN_ID=$(gh run list \
                  --repo "$ORG/$REPO" \
                  --workflow release.yaml \
                  --branch main \
                  --limit 20 \
                  --json databaseId,createdAt,event \
                  --jq "map(select(.event == \"workflow_dispatch\" and .createdAt >= \"$DISPATCHED_AFTER\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")

                if [ -n "$RUN_ID" ]; then
                  break
                fi

                sleep 5
              done

              if [ -n "$RUN_ID" ]; then
                echo "  Dispatched as run $RUN_ID."
                RUN_REPOS+=("$REPO")
                RUN_IDS+=("$RUN_ID")
              else
                echo "  FAILED to find dispatched workflow run."
                DISPATCH_FAILED=$((DISPATCH_FAILED + 1))
              fi
            else
              echo "  FAILED to dispatch."
              DISPATCH_FAILED=$((DISPATCH_FAILED + 1))
            fi
          done

          if [ "$DISPATCH_FAILED" -gt 0 ]; then
            echo "::error title=Release dispatch failed::$DISPATCH_FAILED child workflow dispatch(es) failed."
            exit 1
          fi

          for i in "${!RUN_REPOS[@]}"; do
            REPO="${RUN_REPOS[$i]}"
            RUN_ID="${RUN_IDS[$i]}"

            echo "--- Waiting: $ORG/$REPO run $RUN_ID ---"
            if gh run watch "$RUN_ID" \
              --repo "$ORG/$REPO" \
              --exit-status \
              --interval 10; then
              SUCCEEDED=$((SUCCEEDED + 1))
            else
              RELEASE_FAILED=$((RELEASE_FAILED + 1))
            fi
          done

          echo ""
          echo "=========================================="
          echo "  Completed: $SUCCEEDED / ${#RUN_REPOS[@]}"
          if [ "$RELEASE_FAILED" -gt 0 ]; then
            echo "  Failed releases: $RELEASE_FAILED"
            exit 1
          fi
          echo "=========================================="
