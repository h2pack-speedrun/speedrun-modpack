name: Release All
run-name: ${{ format('{0} {1}', inputs.is-dry-run && 'Dry-run' || 'Release', inputs.tag) }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / Version number (e.g. 1.0.1)"
        required: true
      is-dry-run:
        description: "Dry-run (trigger dry-runs on all repos, no publish)"
        type: boolean
      modules:
        description: "Comma-separated repo names to release (blank = all)"
        required: false

jobs:
  release:
    name: Trigger releases
    runs-on: ubuntu-latest
    steps:
      - name: Check input tag format
        env:
          TAG: ${{ inputs.tag }}
          FILTER: ${{ inputs.modules }}
        run: |
          if ! echo "$TAG" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error title=Invalid package version number::Version numbers must follow the Major.Minor.Patch format (e.g. 1.45.320)."
            exit 1
          fi

          PATCH_VERSION=$(echo "$TAG" | cut -d. -f3)

          if [ -z "$FILTER" ]; then
            if [ "$PATCH_VERSION" != "0" ]; then
              echo "::error title=Invalid Mass Release Version::Mass releases (all modules) must end in .0 (e.g., 1.2.0) to reserve patch numbers for hotfixes."
              exit 1
            fi
          else
            if [ "$PATCH_VERSION" == "0" ]; then
              echo "::error title=Invalid Hotfix Version::Targeted hotfixes must use a patch version greater than .0 (e.g., 1.2.1)."
              exit 1
            fi
          fi

      - name: Check release dispatch token
        env:
          RELEASE_DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$RELEASE_DISPATCH_TOKEN" ]; then
            echo "::error title=Missing RELEASE_DISPATCH_TOKEN::Set a repository or organization secret named RELEASE_DISPATCH_TOKEN using a fine-grained PAT or GitHub App token with Contents: read and Actions: read/write access to the shell, core, and module repositories."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}

      - name: Validate platform dependency versions
        run: python3 Setup/validate_platform_versions.py

      - name: Install Lua validation runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit
          sudo luarocks --lua-version=5.2 install luacheck

      - name: Run ModpackLib tests
        working-directory: adamant-ModpackLib
        run: lua5.2 tests/all.lua

      - name: Run ModpackFramework tests
        working-directory: adamant-ModpackFramework
        run: lua5.2 tests/all.lua

      - name: Validate coordinator sources
        run: |
          (
            cd adamant-Speedrun_Core
            luacheck src/
            find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p
          )

      - name: Validate module sources
        run: |
          for repo in Submodules/adamant-*; do
            if [ ! -d "$repo/src" ]; then
              continue
            fi

            echo "=== Validating $repo ==="
            (
              cd "$repo"
              luacheck src/
              find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p

              if [ -f tests/all.lua ]; then
                echo "--- Running tests for $repo ---"
                lua5.2 tests/all.lua
              fi
            )
          done

      - name: Trigger release workflows
        env:
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.is-dry-run }}
          FILTER: ${{ inputs.modules }}
        run: |
          ORG="h2pack-speedrun"
          CORE_REPO="adamant-Speedrun_Core"

          mapfile -t AVAILABLE_MODULE_REPOS < <(find Submodules \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -name 'adamant-*' \
            -printf '%f\n' | sort)

          is_available_module() {
            local CANDIDATE="$1"
            for MODULE_REPO in "${AVAILABLE_MODULE_REPOS[@]}"; do
              if [ "$MODULE_REPO" = "$CANDIDATE" ]; then
                return 0
              fi
            done
            return 1
          }

          add_module_repo() {
            local CANDIDATE="$1"
            for MODULE_REPO in "${MODULE_REPOS[@]}"; do
              if [ "$MODULE_REPO" = "$CANDIDATE" ]; then
                return
              fi
            done
            MODULE_REPOS+=("$CANDIDATE")
          }

          normalize_release_target() {
            local RAW="$1"
            RAW=$(echo "$RAW" | xargs)

            if [ -z "$RAW" ]; then
              return 1
            fi

            case "$RAW" in
              Core|Speedrun_Core|ModpackSpeedrunCore|adamant-Speedrun_Core)
                echo "$CORE_REPO"
                ;;
              adamant-*)
                echo "$RAW"
                ;;
              Speedrun_*)
                echo "adamant-$RAW"
                ;;
              *)
                echo "adamant-Speedrun_$RAW"
                ;;
            esac
          }

          MODULE_REPOS=()
          CORE_SELECTED=0

          if [ -n "$FILTER" ]; then
            TARGET_ERRORS=0
            IFS=',' read -ra REQUESTED_REPOS <<< "$FILTER"
            for REQUESTED_REPO in "${REQUESTED_REPOS[@]}"; do
              if ! TARGET=$(normalize_release_target "$REQUESTED_REPO"); then
                continue
              fi

              if [ "$TARGET" = "$CORE_REPO" ]; then
                CORE_SELECTED=1
              elif is_available_module "$TARGET"; then
                add_module_repo "$TARGET"
              else
                echo "::error title=Unknown release target::$TARGET is not a checked-out Speedrun module repo."
                TARGET_ERRORS=$((TARGET_ERRORS + 1))
              fi
            done

            if [ "$TARGET_ERRORS" -gt 0 ]; then
              exit 1
            fi
          else
            MODULE_REPOS=("${AVAILABLE_MODULE_REPOS[@]}")
            CORE_SELECTED=1
          fi

          if [ "${#MODULE_REPOS[@]}" -eq 0 ] && [ "$CORE_SELECTED" -eq 0 ]; then
            echo "::error title=No release targets::No module or core release targets were selected."
            exit 1
          fi

          echo "Release order:"
          for REPO in "${MODULE_REPOS[@]}"; do
            echo "  - $REPO"
          done
          if [ "$CORE_SELECTED" -eq 1 ]; then
            echo "  - $CORE_REPO"
          fi

          TOTAL=0
          SUCCEEDED=0

          release_phase() {
            local PHASE="$1"
            shift
            local PHASE_REPOS=("$@")
            local DISPATCH_FAILED=0
            local RELEASE_FAILED=0
            local RUN_REPOS=()
            local RUN_IDS=()

            if [ "${#PHASE_REPOS[@]}" -eq 0 ]; then
              return
            fi

            echo ""
            echo "=========================================="
            echo "  ${PHASE}"
            echo "=========================================="

            for REPO in "${PHASE_REPOS[@]}"; do
              TOTAL=$((TOTAL + 1))
              echo "--- Triggering: $ORG/$REPO ---"
              DISPATCHED_AFTER=$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%SZ)

              if gh workflow run release.yaml \
                --repo "$ORG/$REPO" \
                --field "tag=$TAG" \
                --field "is-dry-run=$DRY_RUN"; then
                RUN_ID=""
                for attempt in {1..30}; do
                  RUN_ID=$(gh run list \
                    --repo "$ORG/$REPO" \
                    --workflow release.yaml \
                    --branch main \
                    --limit 20 \
                    --json databaseId,createdAt,event \
                    --jq "map(select(.event == \"workflow_dispatch\" and .createdAt >= \"$DISPATCHED_AFTER\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")

                  if [ -n "$RUN_ID" ]; then
                    break
                  fi

                  sleep 5
                done

                if [ -n "$RUN_ID" ]; then
                  echo "  Dispatched as run $RUN_ID."
                  RUN_REPOS+=("$REPO")
                  RUN_IDS+=("$RUN_ID")
                else
                  echo "  FAILED to find dispatched workflow run."
                  DISPATCH_FAILED=$((DISPATCH_FAILED + 1))
                fi
              else
                echo "  FAILED to dispatch."
                DISPATCH_FAILED=$((DISPATCH_FAILED + 1))
              fi
            done

            if [ "$DISPATCH_FAILED" -gt 0 ]; then
              echo "::error title=Release dispatch failed::$DISPATCH_FAILED child workflow dispatch(es) failed during $PHASE."
              exit 1
            fi

            for i in "${!RUN_REPOS[@]}"; do
              REPO="${RUN_REPOS[$i]}"
              RUN_ID="${RUN_IDS[$i]}"

              echo "--- Waiting: $ORG/$REPO run $RUN_ID ---"
              if gh run watch "$RUN_ID" \
                  --repo "$ORG/$REPO" \
                  --exit-status \
                  --interval 10; then
                SUCCEEDED=$((SUCCEEDED + 1))
              else
                RELEASE_FAILED=$((RELEASE_FAILED + 1))
              fi
            done

            if [ "$RELEASE_FAILED" -gt 0 ]; then
              echo "::error title=Release failed::$RELEASE_FAILED child workflow run(s) failed during $PHASE."
              exit 1
            fi
          }

          release_phase "Module releases" "${MODULE_REPOS[@]}"
          if [ "$CORE_SELECTED" -eq 1 ]; then
            release_phase "Core release" "$CORE_REPO"
          fi

          echo ""
          echo "=========================================="
          echo "  Completed: $SUCCEEDED / $TOTAL"
          echo "=========================================="
