name: Release All
run-name: ${{ format('{0} {1}', inputs.is-dry-run && 'Dry-run' || 'Release', inputs.tag) }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / Version number (e.g. 1.0.1)"
        required: true
      is-dry-run:
        description: "Dry-run (trigger dry-runs on all repos, no publish)"
        type: boolean
      modules:
        description: "Comma-separated repo names to release (blank = all)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Trigger releases
    runs-on: ubuntu-latest
    steps:
      - name: Check release dispatch token
        env:
          RELEASE_DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$RELEASE_DISPATCH_TOKEN" ]; then
            echo "::error title=Missing RELEASE_DISPATCH_TOKEN::Set a repository or organization secret named RELEASE_DISPATCH_TOKEN using a fine-grained PAT or GitHub App token with Contents: read and Actions: read/write access to the shell, coordinator, and module repositories."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}

      - name: Validate release plan
        env:
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.is-dry-run }}
          FILTER: ${{ inputs.modules }}
        run: |
          python3 ModpackTools/github/release_all.py \
            --org "h2pack-speedrun" \
            --team "adamantSpeedrun" \
            --core-repo "adamantSpeedrun-Speedrun_Modpack" \
            --tag "$TAG" \
            --child-dry-run "$DRY_RUN" \
            --targets "$FILTER" \
            --plan-only

      - name: Validate platform dependency versions
        run: python3 ModpackTools/validate_platform_versions.py

      - name: Install Lua validation runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit
          sudo luarocks --lua-version=5.2 install luacheck

      - name: Run ModpackLib tests
        working-directory: adamant-ModpackLib
        run: lua5.2 tests/all.lua

      - name: Validate coordinator sources
        run: |
          (
            cd adamantSpeedrun-Speedrun_Modpack
            luacheck src/
            find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p
          )

      - name: Validate module sources
        run: |
          shopt -s nullglob
          for repo in Submodules/adamantSpeedrun-*; do
            if [ ! -d "$repo/src" ]; then
              continue
            fi

            echo "=== Validating $repo ==="
            (
              cd "$repo"
              luacheck src/
              find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.2 -p

              if [ -f tests/all.lua ]; then
                echo "--- Running tests for $repo ---"
                lua5.2 tests/all.lua
              fi

              if [ -f tests/integration.lua ]; then
                echo "--- Running integration tests for $repo ---"
                lua5.2 tests/integration.lua
              fi
            )
          done

      - name: Trigger release workflows
        env:
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.is-dry-run }}
          FILTER: ${{ inputs.modules }}
        run: |
          python3 ModpackTools/github/release_all.py \
            --org "h2pack-speedrun" \
            --team "adamantSpeedrun" \
            --core-repo "adamantSpeedrun-Speedrun_Modpack" \
            --tag "$TAG" \
            --child-dry-run "$DRY_RUN" \
            --targets "$FILTER"
